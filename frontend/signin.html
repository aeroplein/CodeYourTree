<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h3>Login</h3>
            <p>Enter your username and password: </p>
            <form action="" id="login-form">
                <div class="form-group">
                    <input type="text" id="username-input" class="form-control" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Password" id="password-input" class="form-control" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password-confirm" class="form-control" placeholder="Confirm Password"
                        required>
                </div>
                <button class="btn btn-success btn-block" id="login-btn">Login</button>
            </form>
        </div>
    </div>


    <script>
        document.getElementById('login-form').addEventListener('submit', function (event) {
            event.preventDefault();
            console.log("login button pressed");
            const username = document.getElementById('username-input').value;
            const password = document.getElementById('password-input').value;
            const passwordConfirm = document.getElementById('password-confirm').value;

            if (password !== passwordConfirm) {
                alert("Passwordds do not match. Please make sure they match.");
                return;
            }
            console.log("Passwords matched. Sending it to backend.")

            fetch('http://localhost:8081/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            })
                .then(response => {
                    if (response.ok) {
                        return response.text();
                    } else {
                        throw new Error("Wrong password or username.")
                    }
                })
                .then(data => {
                    localStorage.setItem("loggedUser", data);

                    window.location.href = "index.html";
                })
                .catch(error => {
                    alert(error.message);
                })
        })

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
