<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <title>Join the Garden | CodeYourTree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/signup.css">
</head>

<body>
    <div class="auth-card">
        <div class="auth-header">
            <h2>Start Growing</h2>
            <p>Create your account and grow your tree.</p>
        </div>
        <form action="" id="signup-form">
            <div class="form-group">
                <label for="">Username</label>
                <input type="text" id="username" class="form-control" placeholder="e.g. dev_john" required>
            </div>
            <div class="form-group">
                <label for="">Email</label>
                <input type="text" id="email" class="form-control" placeholder="hello@example.com" required>
            </div>
            <div class="form-group">
                <label for="">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Password" required>
            </div>
            <div class="form-group">
                <label for="">Confirm Password</label>
                <input type="password" id="confirm-password" class="form-control" placeholder="Repeat your password">
            </div>
            <button type="submit" class="btn-auth">Create Account</button>
        </form>

        <div class="auth-footer">Already have a tree?
            <a href="signin.html">Sign In</a>
        </div>
        <div id="toast"></div>
    </div>
    <script src="js/signup.js"></script>
</body>

</html>
